<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background for maskable safe-zone (entire 512 is the safe area gets cropped) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- artwork constrained to inner 80% safe zone (centered) -->
  <g transform="translate(51 51) scale(0.8)" fill="none" stroke="url(#brand)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <path d="M64 220 C 128 180, 192 260, 256 220 S 384 180, 448 220"/>
    <path d="M64 300 C 128 260, 192 340, 256 300 S 384 260, 448 300"/>
    <path d="M64 380 C 128 340, 192 420, 256 380 S 384 340, 448 380"/>
    <circle cx="396" cy="148" r="34" fill="#ef4444" stroke="none"/>
  </g>
</svg>
